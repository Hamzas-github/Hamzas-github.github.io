<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1714"/>
      <stop offset="1" stop-color="#221c17"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#e8703a" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#e8703a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>

  <!-- floating glass chat panel -->
  <g>
    <rect x="180" y="70" width="440" height="360" rx="34" fill="#000000" opacity="0.25" filter="url(#soft)"/>
    <rect x="170" y="60" width="440" height="360" rx="34" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
    <rect x="171" y="61" width="438" height="60" rx="33" fill="#ffffff" opacity="0.06"/>

    <!-- header -->
    <circle cx="205" cy="95" r="11" fill="#e8703a"/>
    <rect x="226" y="89" width="120" height="12" rx="6" fill="#ffffff" opacity="0.7"/>

    <!-- incoming bubble -->
    <rect x="195" y="150" width="240" height="58" rx="20" fill="#ffffff" opacity="0.12"/>
    <rect x="213" y="168" width="180" height="9" rx="4.5" fill="#ffffff" opacity="0.55"/>
    <rect x="213" y="185" width="130" height="9" rx="4.5" fill="#ffffff" opacity="0.35"/>

    <!-- outgoing bubble (accent) -->
    <rect x="345" y="232" width="220" height="58" rx="20" fill="#e8703a" opacity="0.9"/>
    <rect x="363" y="250" width="160" height="9" rx="4.5" fill="#ffffff" opacity="0.85"/>
    <rect x="363" y="267" width="110" height="9" rx="4.5" fill="#ffffff" opacity="0.6"/>

    <!-- voice waveform -->
    <g transform="translate(195,320)" fill="#e8703a">
      <rect x="0" y="12" width="6" height="16" rx="3" opacity="0.6"/>
      <rect x="12" y="4" width="6" height="32" rx="3" opacity="0.8"/>
      <rect x="24" y="14" width="6" height="12" rx="3" opacity="0.5"/>
      <rect x="36" y="0" width="6" height="40" rx="3"/>
      <rect x="48" y="10" width="6" height="20" rx="3" opacity="0.7"/>
      <rect x="60" y="6" width="6" height="28" rx="3" opacity="0.85"/>
      <rect x="72" y="16" width="6" height="8" rx="3" opacity="0.45"/>
    </g>

    <!-- input pill -->
    <rect x="195" y="370" width="390" height="34" rx="17" fill="#ffffff" opacity="0.1"/>
    <circle cx="567" cy="387" r="13" fill="#e8703a"/>
  </g>
</svg>
